name: go-quality
on: [push, pull_request]
permissions: {contents: read}
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.22.x'}
      - name: Format report
        run: test -z "$(gofmt -l cmd internal)"
      - name: Compile and vet
        run: go vet ./... && go build ./...
      - name: Unit and race tests
        run: go test ./... && go test -race ./...
      - name: Coverage report and gate
        run: |
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage.txt
          coverage=$(awk '/^total:/ {sub(/%/, "", $3); print $3}' coverage.txt)
          awk -v coverage="$coverage" 'BEGIN {if (coverage < 99) exit 1}'
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: go-quality-reports, path: 'coverage.*', if-no-files-found: warn}
