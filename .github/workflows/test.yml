name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Enforce coverage
        run: |
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage.txt
          coverage=$(awk '/^total:/ { sub(/%/, "", $3); print $3 }' coverage.txt)
          awk -v coverage="$coverage" 'BEGIN { exit !(coverage >= 99) }'
      - name: Build static sample and OCI layout
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o oci-builder ./cmd/oci-builder
          ./oci-builder -binary ./oci-builder -output ./oci-image -arch amd64
          test -f oci-image/oci-layout
          test -f oci-image/index.json
          test "$(find oci-image/blobs/sha256 -type f | wc -l)" -eq 3
      - name: Install ORAS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: oras-project/setup-oras@v1
      - name: Publish OCI layout to GHCR
        id: publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          ORAS_USERNAME: ${{ github.actor }}
          ORAS_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$ORAS_PASSWORD" | oras login ghcr.io -u "$ORAS_USERNAME" --password-stdin
          oras cp --from-oci-layout ./oci-image:secure-oci-base:latest ghcr.io/${{ github.repository }}:latest
      - name: Report publishing result
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "GHCR publishing outcome: ${{ steps.publish.outcome }}"
      - name: Upload OCI layout artifact
        if: github.event_name != 'push' || github.ref != 'refs/heads/main' || steps.publish.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: secure-oci-layout
          path: oci-image
          if-no-files-found: error
