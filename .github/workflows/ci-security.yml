name: security-analysis
on:
  push:
  pull_request:
  schedule: [{cron: '17 3 * * 1'}]
permissions: {contents: read}
jobs:
  zero-trust-static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate workflow supply-chain controls
        run: |
          set -euo pipefail
          python3 scripts/ci/verify-workflows.py
      - name: Static analysis and security regression tests
        env: {GOTOOLCHAIN: local}
        run: |
          set -euo pipefail
          go vet ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
          go test -race ./...
          test -z "$(find . -name '*.go' -type f -exec grep -nE 'os/exec|exec\.Command|InsecureSkipVerify' {} + || true)"
