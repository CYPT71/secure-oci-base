name: codeql-analysis

on:
  push:
  pull_request:
  schedule: [{cron: '29 3 * * 1'}]

permissions: {contents: read, security-events: write}

jobs:
  analyze-go:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install the pinned Go toolchain
        uses: actions/setup-go@v5
        with: {go-version: '1.25.8', check-latest: true}
      # The official CodeQL actions reliably provision a matching bundle on
      # hosted runners; the policy verifier permits only this documented v4
      # exception to SHA pinning.
      - uses: github/codeql-action/init@v4
        with: {languages: go, build-mode: manual}
      - name: Build Go for CodeQL extraction
        env: {GOTOOLCHAIN: local}
        run: |
          set -euo pipefail
          go build ./...
      - uses: github/codeql-action/analyze@v4
        with: {category: '/language:go'}
