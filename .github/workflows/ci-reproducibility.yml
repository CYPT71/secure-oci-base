name: reproducibility
on:
  push:
  pull_request:
  schedule: [{cron: '23 4 * * 1'}]
permissions: {contents: read}
jobs:
  rebuild-a:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install the pinned Go toolchain
        uses: actions/setup-go@v5
        with: {go-version: '1.25.8'}
      - name: Build independently reproducible layout A
        env: {GOTOOLCHAIN: local, SOURCE_DATE_EPOCH: '0'}
        run: |
          set -euo pipefail
          scripts/ci/build-verified-layout.sh layout oci-builder amd64
          tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner -cf layout.tar layout oci-builder
          sha256sum layout.tar > layout.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: reproducibility-a
          path: |
            layout.tar
            layout.sha256
          if-no-files-found: error
          retention-days: 14
  rebuild-b:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install the pinned Go toolchain
        uses: actions/setup-go@v5
        with: {go-version: '1.25.8'}
      - name: Build independently reproducible layout B
        env: {GOTOOLCHAIN: local, SOURCE_DATE_EPOCH: '0'}
        run: |
          set -euo pipefail
          scripts/ci/build-verified-layout.sh layout oci-builder amd64
          tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner -cf layout.tar layout oci-builder
          sha256sum layout.tar > layout.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: reproducibility-b
          path: |
            layout.tar
            layout.sha256
          if-no-files-found: error
          retention-days: 14
  compare:
    needs: [rebuild-a, rebuild-b]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with: {name: reproducibility-a, path: a}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with: {name: reproducibility-b, path: b}
      - name: Compare independent rebuild bytes
        run: |
          set -euo pipefail
          cmp a/layout.tar b/layout.tar
          cmp a/layout.sha256 b/layout.sha256
          cp a/layout.sha256 reproducibility.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with: {name: reproducibility-evidence, path: reproducibility.sha256, if-no-files-found: error, retention-days: 14}
