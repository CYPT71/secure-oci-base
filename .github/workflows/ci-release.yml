name: release-evidence
on:
  push:
    branches: [main]
permissions: {contents: write, packages: write, id-token: write}
jobs:
  release-candidate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install the pinned Go toolchain
        uses: actions/setup-go@v7
        with: {go-version: '1.25.8'}
      - name: Create independently verifiable release evidence
        env: {GOTOOLCHAIN: local}
        run: |
          set -euo pipefail
          scripts/ci/build-verified-layout.sh oci-image oci-builder amd64 | tee release-validation.txt
          sha256sum oci-builder oci-image/blobs/sha256/* | sort > checksums.sha256
          printf 'revision=%s\nrun=%s\nworkflow=%s\n' "$GITHUB_SHA" "$GITHUB_RUN_ID" "$GITHUB_WORKFLOW" > traceability.txt
      # The Docker daemon's default driver cannot export SBOM/provenance
      # attestations. Create an isolated BuildKit container driver before build.
      - name: Set up an attestation-capable BuildKit builder
        uses: docker/setup-buildx-action@v4
        with: {driver: docker-container}
      - name: Publish SBOM and provenance-attested image to GHCR
        env:
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: main-${{ github.run_number }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/$(printf '%s' "$REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "$REGISTRY_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin
          docker buildx build --pull=false --provenance=mode=max --sbom=true --push --tag "$IMAGE:$TAG" .
          docker pull "$IMAGE:$TAG"
          docker save --output secure-oci-base-image.tar "$IMAGE:$TAG"
          sha256sum secure-oci-base-image.tar >> checksums.sha256
          printf 'docker_image=%s:%s\nload_command=docker load --input secure-oci-base-image.tar\n' "$IMAGE" "$TAG" >> traceability.txt
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with: {cosign-release: 'v2.4.1'}
      - name: Sign and verify the published image with GitHub OIDC
        env:
          REPOSITORY: ${{ github.repository }}
          TAG: main-${{ github.run_number }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/$(printf '%s' "$REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          command -v cosign
          cosign sign --yes "$IMAGE:$TAG"
          cosign verify --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/ci-release.yml@" --certificate-oidc-issuer https://token.actions.githubusercontent.com "$IMAGE:$TAG" | tee signature-verification.json
      - name: Package all validation reports
        run: |
          set -euo pipefail
          mkdir release-reports
          cp checksums.sha256 release-validation.txt signature-verification.json traceability.txt release-reports/
          cp -a oci-image release-reports/oci-image
          (cd release-reports && zip -qr ../secure-oci-base-reports.zip .)
      - name: Create the main-merge GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: main-${{ github.run_number }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "Main merge $RELEASE_TAG" \
            --notes "Automated release for $GITHUB_SHA. Load the attached Docker image with \`docker load --input secure-oci-base-image.tar\`. Validation reports and the verified OCI layout are in secure-oci-base-reports.zip." \
            secure-oci-base-image.tar secure-oci-base-reports.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-oci-evidence
          path: |
            oci-image
            secure-oci-base-image.tar
            secure-oci-base-reports.zip
            checksums.sha256
            release-validation.txt
            traceability.txt
            signature-verification.json
          if-no-files-found: error
          retention-days: 90
