name: release-publication
on:
  push:
    tags: ['v*']
permissions: {contents: read, packages: write, attestations: write, id-token: write}
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.22.x'}
      - uses: oras-project/setup-oras@v1
      - name: Build one signed release candidate layout
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o service ./cmd/oci-builder
          go run ./cmd/oci-builder -binary service -output oci-image -arch amd64
          sha256sum oci-image/blobs/sha256/* > checksums.sha256
      - name: Publish to GHCR
        id: publish
        continue-on-error: true
        env: {ORAS_USERNAME: '${{ github.actor }}', ORAS_PASSWORD: '${{ secrets.GITHUB_TOKEN }}'}
        run: echo "$ORAS_PASSWORD" | oras login ghcr.io -u "$ORAS_USERNAME" --password-stdin && oras cp --from-oci-layout ./oci-image:secure-oci-base:latest ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-oci-evidence
          path: |
            oci-image
            checksums.sha256
