name: oci-validation
on: [push, pull_request]
permissions: {contents: read}
jobs:
  layout-and-negative-cases:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install the pinned Go toolchain
        uses: actions/setup-go@v7
        with: {go-version: '1.25.8'}
      - name: Build, validate, and emit evidence
        env: {GOTOOLCHAIN: local}
        run: |
          set -euo pipefail
          scripts/ci/build-verified-layout.sh oci-image service amd64 | tee oci-validation.txt
          sha256sum oci-image/blobs/sha256/* | sort | tee oci-blobs.sha256
          find oci-image -printf '%m %s %p\n' | LC_ALL=C sort | tee oci-filesystem.txt
      - name: Prove hostile OCI layouts are rejected
        run: |
          set -euo pipefail
          python3 scripts/ci/negative-oci-layout.py scripts/ci/verify-oci-layout.py oci-image | tee oci-negative.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: oci-validation-evidence
          path: |
            oci-*.txt
            oci-*.sha256
          if-no-files-found: error
          retention-days: 14
