name: pull-request-policy
on: [pull_request]
permissions: {contents: read}
jobs:
  policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Enforce repository and workflow policy
        run: |
          set -eu
          python3 scripts/ci/verify-workflows.py
          test -z "$(git ls-files | rg '(^|/)(coverage\.out|coverage\.txt|oci-image|oci-builder|service)$' || true)"
          test -z "$(rg -n --glob '!README.md' 'TODO|FIXME|placeholder' . || true)"
          git diff --check "${{ github.event.pull_request.base.sha }}" HEAD
